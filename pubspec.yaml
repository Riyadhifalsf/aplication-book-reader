name: babeh_reader
version: 0.6.0+6
description: Modern full offline book reader for Android.
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.1.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  path: ^1.9.1
  archive: ^4.0.9
  flutter_pdfview: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
